<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>布局 C · 双栏对话 · 留学 AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4F0E8;
    --bg-warm: #EDE7DA;
    --bg-card: #FFFFFF;
    --bg-soft: #FBF8F2;
    --ink: #1C1B17;
    --ink-soft: #5C584F;
    --ink-dim: #9D978C;
    --line: rgba(28, 27, 23, 0.08);
    --line-strong: rgba(28, 27, 23, 0.18);
    --accent: #B25438;
    --accent-soft: rgba(178, 84, 56, 0.12);
    --accent-strong: rgba(178, 84, 56, 0.25);
    --green: #6B8E5A;
    --shadow-sm: 0 1px 2px rgba(28,27,23,0.04);
    --shadow-md: 0 8px 24px rgba(28,27,23,0.06);
    --shadow-lg: 0 30px 60px -20px rgba(28,27,23,0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', 'Noto Sans SC', -apple-system, "PingFang SC", sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  .serif { font-family: 'Noto Serif SC', serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* DEMO BANNER */
  .demo-banner {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 500;
    background: var(--ink);
    color: var(--bg);
    padding: 8px 14px;
    border-radius: 100px;
    font-size: 12px;
    display: flex;
    gap: 10px;
    align-items: center;
    box-shadow: var(--shadow-md);
  }
  .demo-banner a, .demo-banner button {
    color: var(--bg);
    opacity: 0.55;
    text-decoration: none;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
  }
  .demo-banner a:hover, .demo-banner button:hover { opacity: 1; }
  .demo-banner b { font-weight: 600; }

  /* ============ LANDING ============ */
  .landing {
    transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    min-height: 100vh;
  }
  .landing.hidden {
    opacity: 0;
    transform: translateY(-30px);
    pointer-events: none;
    position: fixed;
    inset: 0;
  }

  nav.landing-nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(20px);
    background: rgba(244, 240, 232, 0.85);
    border-bottom: 1px solid transparent;
  }
  nav.landing-nav.scrolled { border-bottom-color: var(--line); }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Noto Serif SC', serif;
    font-weight: 700;
    font-size: 18px;
  }
  .logo-mark {
    width: 26px;
    height: 26px;
    background: var(--ink);
    border-radius: 50%;
    position: relative;
  }
  .logo-mark::after {
    content: "";
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 12px; height: 12px;
    background: var(--accent);
    border-radius: 50%;
  }
  .nav-cta {
    background: var(--ink);
    color: var(--bg);
    padding: 9px 18px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    border: none;
    cursor: pointer;
  }

  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 100px 32px 60px;
    text-align: center;
  }
  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--ink-soft);
    padding: 5px 12px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 100px;
    margin-bottom: 28px;
    box-shadow: var(--shadow-sm);
  }
  .hero-eyebrow::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
  }
  .hero h1 {
    font-family: 'Noto Serif SC', serif;
    font-weight: 600;
    font-size: clamp(48px, 7vw, 88px);
    line-height: 1.08;
    letter-spacing: -0.025em;
    margin-bottom: 28px;
  }
  .hero h1 em {
    font-style: italic;
    font-weight: 900;
    color: var(--accent);
  }
  .hero-sub {
    font-size: clamp(16px, 1.4vw, 20px);
    color: var(--ink-soft);
    max-width: 640px;
    margin: 0 auto 48px;
    line-height: 1.9;
  }
  .hero-input-wrap {
    width: 100%;
    max-width: 720px;
    margin-bottom: 24px;
    position: relative;
  }
  .hero-input {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--line-strong);
    border-radius: 20px;
    padding: 22px 26px;
    font-size: 16px;
    font-family: inherit;
    color: var(--ink);
    outline: none;
    box-shadow: var(--shadow-lg);
    transition: border-color 0.2s, box-shadow 0.3s, transform 0.2s;
  }
  .hero-input:hover { transform: translateY(-2px); }
  .hero-input:focus {
    border-color: var(--accent);
    box-shadow: var(--shadow-lg), 0 0 0 5px var(--accent-soft);
  }
  .hero-input::placeholder { color: var(--ink-dim); }
  .pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 720px;
  }
  .pill {
    padding: 8px 14px;
    background: rgba(255,255,255,0.4);
    border: 1px solid var(--line);
    border-radius: 100px;
    font-size: 12px;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.2s;
  }
  .pill:hover {
    background: var(--bg-card);
    color: var(--ink);
    border-color: var(--line-strong);
  }

  /* ============ APP (SPLIT VIEW) ============ */
  .app {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }
  .app.active {
    opacity: 1;
    pointer-events: auto;
  }

  /* App Top Bar */
  .app-topbar {
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--line);
    background: var(--bg);
    flex-shrink: 0;
  }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .app-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Noto Serif SC', serif;
    font-weight: 700;
    font-size: 15px;
  }
  .app-logo-mark {
    width: 22px;
    height: 22px;
    background: var(--ink);
    border-radius: 50%;
    position: relative;
  }
  .app-logo-mark::after {
    content: "";
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
  }
  .session-title {
    font-size: 13px;
    color: var(--ink-soft);
    padding-left: 14px;
    border-left: 1px solid var(--line);
  }
  .topbar-right { display: flex; gap: 8px; align-items: center; }
  .topbar-model {
    font-size: 11px;
    color: var(--ink-soft);
    padding: 5px 11px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 100px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
  }
  .topbar-back {
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 100px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--ink-soft);
    cursor: pointer;
    font-family: inherit;
  }
  .topbar-back:hover { color: var(--ink); background: var(--bg-card); }

  /* SPLIT VIEW */
  .split {
    flex: 1;
    display: flex;
    min-height: 0;
  }
  .pane-left {
    flex: 1;
    background: var(--bg-warm);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .pane-right {
    width: 520px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }

  /* ===== LEFT PANE - WEBSITE VIEWER ===== */
  .viewer-bar {
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .viewer-tabs { display: flex; gap: 6px; }
  .viewer-dot {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: var(--line-strong);
    opacity: 0.5;
  }
  .viewer-url {
    flex: 1;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 100px;
    padding: 5px 14px;
    font-size: 12px;
    color: var(--ink-soft);
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .viewer-url::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }
  .viewer-open {
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 100px;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--ink-soft);
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .viewer-open:hover { color: var(--ink); background: var(--bg-card); }

  /* The "rendered" page content */
  .viewer-body {
    flex: 1;
    overflow-y: auto;
    background: var(--bg-card);
  }
  .viewer-content {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 60px 80px;
  }
  .viewer-school-header {
    padding-bottom: 24px;
    margin-bottom: 32px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .viewer-school-crest {
    width: 44px;
    height: 44px;
    border-radius: 8px;
    background: linear-gradient(135deg, #2c3a5e, #4a5e8f);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif SC', serif;
    font-weight: 700;
    font-size: 18px;
    flex-shrink: 0;
  }
  .viewer-school-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--ink);
  }
  .viewer-school-dept {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 2px;
  }
  .viewer-trans {
    margin-left: auto;
    font-size: 11px;
    color: var(--ink-dim);
    font-family: 'JetBrains Mono', monospace;
    padding: 4px 10px;
    background: var(--bg-soft);
    border-radius: 100px;
  }
  .viewer h1.page-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 8px;
    line-height: 1.2;
  }
  .viewer .page-sub {
    font-size: 13px;
    color: var(--ink-dim);
    margin-bottom: 28px;
    font-family: 'JetBrains Mono', monospace;
  }
  .viewer p {
    font-size: 15px;
    line-height: 1.85;
    color: var(--ink);
    margin-bottom: 18px;
  }
  .viewer h2 {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    font-weight: 700;
    margin-top: 36px;
    margin-bottom: 16px;
    color: var(--ink);
  }
  .viewer .req-list {
    list-style: none;
    margin: 12px 0 24px;
  }
  .viewer .req-list li {
    padding: 10px 0 10px 28px;
    border-bottom: 1px solid var(--line);
    position: relative;
    font-size: 14.5px;
    color: var(--ink);
  }
  .viewer .req-list li::before {
    content: "→";
    position: absolute;
    left: 4px;
    color: var(--ink-dim);
  }
  .viewer .program-card {
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 10px;
    font-size: 14px;
  }
  .viewer .program-card-name {
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .viewer .program-card-meta {
    font-size: 12px;
    color: var(--ink-soft);
    font-family: 'JetBrains Mono', monospace;
  }

  /* HIGHLIGHT marker for cited content */
  .hl {
    background: linear-gradient(180deg, transparent 60%, var(--accent-soft) 60%);
    padding: 2px 4px;
    margin: -2px -4px;
    border-radius: 3px;
    transition: background 0.3s;
    position: relative;
    cursor: pointer;
  }
  .hl.flash {
    background: linear-gradient(180deg, var(--accent-strong) 0%, var(--accent-soft) 100%);
    animation: flashIn 0.6s ease;
  }
  @keyframes flashIn {
    0% { background: var(--accent); color: white; padding: 4px 6px; }
    100% { padding: 2px 4px; }
  }
  .hl::after {
    content: attr(data-ref);
    position: absolute;
    top: -8px;
    right: -16px;
    font-size: 9px;
    color: var(--accent);
    background: var(--bg-card);
    border: 1px solid var(--accent);
    border-radius: 3px;
    padding: 1px 4px;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1;
  }

  /* ===== LEFT PANE - CASE COMPARISON ===== */
  .case-view {
    padding: 32px 36px;
    overflow-y: auto;
  }
  .case-header {
    margin-bottom: 28px;
  }
  .case-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 8px;
  }
  .case-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 24px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 8px;
  }
  .case-sub {
    font-size: 13px;
    color: var(--ink-soft);
  }
  .case-you {
    background: var(--ink);
    color: var(--bg);
    border-radius: 14px;
    padding: 18px 22px;
    margin-bottom: 20px;
  }
  .case-you-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    opacity: 0.6;
    margin-bottom: 6px;
    letter-spacing: 0.1em;
  }
  .case-you-meta {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .case-you-detail {
    font-size: 12px;
    opacity: 0.7;
    line-height: 1.6;
  }
  .case-cards {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .case-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 18px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
  }
  .case-card-bg { font-size: 13px; color: var(--ink); font-weight: 500; }
  .case-card-meta { font-size: 11px; color: var(--ink-soft); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
  .case-card-result {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 100px;
    align-self: center;
    font-weight: 600;
  }
  .res-y { background: rgba(107, 142, 90, 0.15); color: var(--green); }
  .res-n { background: rgba(178, 84, 56, 0.12); color: var(--accent); }
  .res-w { background: var(--bg-soft); color: var(--ink-soft); }

  /* ===== RIGHT PANE - CHAT ===== */
  .chat-conv {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
  }
  .chat-msgs {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .msg {
    display: flex;
    gap: 12px;
  }
  .msg.user { flex-direction: row-reverse; }
  .msg-av {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
  }
  .msg-av.ai { background: var(--accent); color: white; }
  .msg-av.user { background: var(--bg-warm); color: var(--ink-soft); }
  .msg-content { max-width: 380px; }
  .msg-bub {
    background: var(--bg-card);
    border: 1px solid var(--line);
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--ink);
  }
  .msg.user .msg-bub {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  .skill-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 6px;
  }
  .skill-chip::before {
    content: "";
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
  }
  .cite {
    display: inline-flex;
    align-items: baseline;
    background: var(--bg);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 0 5px;
    border-radius: 4px;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    margin: 0 2px;
    cursor: pointer;
    vertical-align: super;
    line-height: 1.2;
  }
  .cite:hover { background: var(--accent); color: white; }

  /* Source indicator on AI bubble */
  .source-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    padding: 5px 10px;
    background: var(--bg-soft);
    border-radius: 8px;
    font-size: 11px;
    color: var(--ink-soft);
    font-family: 'JetBrains Mono', monospace;
  }
  .source-tag::before {
    content: "";
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
  }

  /* Composer */
  .chat-composer {
    padding: 16px 22px 22px;
    border-top: 1px solid var(--line);
    flex-shrink: 0;
  }
  .composer-suggests {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .composer-suggest {
    font-size: 11px;
    padding: 5px 10px;
    background: var(--bg-warm);
    border: 1px solid var(--line);
    border-radius: 100px;
    color: var(--ink-soft);
    cursor: pointer;
  }
  .composer-suggest:hover { background: var(--bg-card); color: var(--ink); }
  .composer-box {
    background: var(--bg-card);
    border: 1px solid var(--line-strong);
    border-radius: 14px;
    padding: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
    box-shadow: var(--shadow-sm);
  }
  .composer-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }
  .composer-box input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    padding: 12px 14px;
    font-size: 14px;
    font-family: inherit;
    color: var(--ink);
  }
  .composer-box input::placeholder { color: var(--ink-dim); }
  .composer-send {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--ink);
    color: var(--bg);
    border: none;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .composer-meta {
    margin-top: 8px;
    font-size: 10px;
    color: var(--ink-dim);
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Empty state for left pane */
  .empty-pane {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    color: var(--ink-dim);
    text-align: center;
    padding: 40px;
  }
  .empty-pane-mark {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif SC', serif;
    font-size: 24px;
    color: var(--ink-dim);
    margin-bottom: 8px;
  }
  .empty-pane h3 {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--ink-soft);
  }

<script>
  // ============ STATE ============
  let currentScenario = null;
  let currentMode = 'reader'; // 'reader' | 'original'

  function setMode(mode) {
    if (mode === currentMode) return;
    currentMode = mode;
    // re-render current school view
    if (currentScenario === 'polimi-programs') renderPolimi();
    else if (currentScenario === 'cam-mphil') renderCambridge();
    else if (currentScenario === 'usc-mscs') renderUSC();
  }

  const heroInput = document.getElementById('heroInput');
  heroInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && heroInput.value.trim()) {
      // Default route to school query
      const v = heroInput.value.trim();
      if (v.includes('米兰')) ask(v, 'polimi-programs');
      else if (v.includes('剑桥') || v.includes('Cambridge')) ask(v, 'cam-mphil');
      else if (v.includes('USC')) ask(v, 'usc-mscs');
      else if (v.includes('能申') || v.includes('GPA')) ask(v, 'case-compare');
      else ask(v, 'polimi-programs');
    }
  });

  function ask(question, scenario) {
    const landing = document.getElementById('landing');
    const app = document.getElementById('app');
    landing.classList.add('hidden');
    setTimeout(() => {
      app.classList.add('active');
      runScenario(question, scenario);
    }, 280);
  }

  function reset() {
    const landing = document.getElementById('landing');
    const app = document.getElementById('app');
    app.classList.remove('active');
    setTimeout(() => {
      landing.classList.remove('hidden');
      heroInput.value = '';
      window.scrollTo({ top: 0 });
      document.getElementById('chatMsgs').innerHTML = '';
      document.getElementById('paneLeft').innerHTML = '';
    }, 300);
  }

  // ============ SCENARIOS ============
  function runScenario(question, key) {
    document.getElementById('chatMsgs').innerHTML = '';
    addUserMsg(question);
    document.getElementById('sessionTitle').textContent = question;
    currentScenario = key;
    currentMode = 'reader'; // 默认进入 reader 模式

    if (key === 'polimi-programs') {
      renderPolimi();
      setTimeout(() => addAiPolimi(), 700);
      setTimeout(() => setSuggests([
        ['你说的工程类共几个', 'polimi-more'],
        ['ACS 那个项目难申吗', 'cam-mphil'],
        ['推荐我冲哪个', 'case-compare'],
      ]), 1800);
    } else if (key === 'cam-mphil') {
      renderCambridge();
      setTimeout(() => addAiCambridge(), 700);
      setTimeout(() => setSuggests([
        ['雅思要多少', 'cam-ielts'],
        ['我能申到吗', 'case-compare'],
        ['切回米兰理工', 'polimi-programs'],
      ]), 1800);
    } else if (key === 'usc-mscs') {
      renderUSC();
      setTimeout(() => addAiUSC(), 700);
      setTimeout(() => setSuggests([
        ['我托福 100 行吗', 'case-compare'],
        ['看下完整录取要求', 'usc-mscs'],
      ]), 1800);
    } else if (key === 'case-compare') {
      renderCase();
      setTimeout(() => addAiCase(), 700);
      setTimeout(() => setSuggests([
        ['想冲 CMU 该补什么', 'cam-mphil'],
        ['看下 USC 官网要求', 'usc-mscs'],
      ]), 1800);
    } else if (key === 'polimi-more') {
      // Stay on polimi, add more detail
      addUserMsg('你说的工程类共几个');
      setTimeout(() => {
        addAiMsg(`
          <div class="skill-chip">官网解读 · Politecnico di Milano</div>

  // ============ CITATION HIGHLIGHT ============
  function flashHl(ref) {
    const els = document.querySelectorAll(`[data-ref="${ref}"]`);
    els.forEach(el => {
      el.classList.add('flash');
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      setTimeout(() => el.classList.remove('flash'), 1200);
    });
  }

  // ============ SUGGESTIONS ============
  function setSuggests(arr) {
    const wrap = document.getElementById('suggests');
    wrap.innerHTML = '';
    arr.forEach(([txt, key]) => {
      const div = document.createElement('div');
      div.className = 'composer-suggest';
      div.textContent = txt;
      div.onclick = () => {
        wrap.innerHTML = '';
        runScenario(txt, key);
      };
      wrap.appendChild(div);
    });
  }

  // ============ COMPOSER ============
  function sendApp() {
    const input = document.getElementById('appInput');
    if (!input.value.trim()) return;
    addUserMsg(input.value);
    input.value = '';
    setTimeout(() => {
      addAiMsg('<i style="color: var(--ink-dim);">（Demo 模式 · 真实版本会根据问题自动判断要不要查官网、查哪个、怎么解读）</i>');
    }, 500);
  }
  document.getElementById('appInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendApp();
  });

  // ============ UTILS ============
  function scrollChat() {
    const conv = document.getElementById('convScroll');
    conv.scrollTop = conv.scrollHeight;
  }
  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, m => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[m]));
  }
