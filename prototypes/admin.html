<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IZANOFFER Admin</title>
<style>
  :root {
    --bg: #ebe7df;
    --panel: #fffefa;
    --side: #f6f4ef;
    --soft: #f7f2e9;
    --line: rgba(55, 44, 32, 0.12);
    --text: #1f1d18;
    --muted: #756f64;
    --dim: #a09689;
    --accent: #b25438;
    --accent-soft: rgba(178, 84, 56, 0.12);
    --green: #57785a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: transparent;
    color: var(--text);
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .shell {
    width: 100vw;
    height: 100vh;
    margin: 0;
    border: 1px solid var(--line);
    border-radius: 0;
    background: var(--panel);
    display: grid;
    grid-template-columns: 230px 1fr;
    overflow: hidden;
    box-shadow: none;
  }
  aside {
    background: var(--side);
    border-right: 1px solid var(--line);
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .search {
    height: 40px;
    border-radius: 9px;
    background: var(--panel);
    color: var(--muted);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 10px;
  }
  .nav-title {
    color: var(--dim);
    font-size: 13px;
    padding: 0 10px;
  }
  .nav {
    display: grid;
    gap: 4px;
  }
  .nav button {
    border: 0;
    background: transparent;
    color: var(--muted);
    border-radius: 9px;
    min-height: 38px;
    padding: 0 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    font: inherit;
    cursor: pointer;
    text-align: left;
  }
  .nav button.active, .nav button:hover {
    background: rgba(178, 84, 56, 0.08);
    color: var(--text);
  }
  .dot {
    width: 18px;
    height: 18px;
    border: 1px solid currentColor;
    border-radius: 5px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
  }
  main {
    overflow: auto;
    padding: 46px 64px 80px;
  }
  .top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 24px;
    margin-bottom: 28px;
    max-width: 920px;
  }
  h1 {
    margin: 0 0 8px;
    font-size: 20px;
  }
  .sub {
    color: var(--muted);
    font-size: 14px;
  }
  .ghost {
    background: var(--soft);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 100px;
    padding: 9px 13px;
    font: inherit;
    cursor: pointer;
  }
  input {
    font: inherit;
    outline: none;
  }
  section {
    display: none;
    margin-top: 0;
    padding-top: 4px;
    max-width: 920px;
  }
  section.active { display: block; }
  h2 {
    font-size: 18px;
    margin: 0 0 18px;
  }
  .metric-row {
    display: grid;
    grid-template-columns: minmax(220px, 280px) minmax(340px, 1fr) auto;
    align-items: center;
    column-gap: 28px;
    min-height: 68px;
    margin: 0;
    padding: 14px 0;
    border-bottom: 1px solid var(--line);
  }
  .metric-name {
    font-size: 16px;
    margin-bottom: 7px;
  }
  .metric-note {
    color: var(--muted);
    font-size: 14px;
  }
  .bar {
    height: 10px;
    background: rgba(55, 44, 32, 0.12);
    border-radius: 999px;
    overflow: hidden;
  }
  .bar span {
    display: block;
    height: 100%;
    background: var(--accent);
    border-radius: inherit;
  }
  .bar.red span { background: #c84c3f; }
  .pct {
    color: var(--muted);
    text-align: right;
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
  }
  .card {
    border: 1px solid var(--line);
    background: var(--soft);
    border-radius: 10px;
    padding: 14px;
  }
  .card b {
    display: block;
    font-size: 22px;
    margin-bottom: 6px;
  }
  .card span {
    color: var(--muted);
    font-size: 13px;
  }
  .info-grid {
    display: grid;
    border-top: 1px solid var(--line);
  }
  .info-item {
    border-bottom: 1px solid var(--line);
    background: transparent;
    border-radius: 0;
    padding: 14px 0;
    min-height: 68px;
    display: grid;
    grid-template-columns: minmax(220px, 280px) minmax(340px, 1fr);
    column-gap: 28px;
    align-items: center;
  }
  .info-item b {
    display: block;
    color: var(--text);
    font-size: 15px;
    margin-bottom: 0;
    font-weight: 500;
  }
  .field-copy {
    color: var(--muted);
    font-size: 12px;
    margin-top: 5px;
    line-height: 1.45;
  }
  .info-item span {
    color: var(--text);
    font-size: 14px;
    line-height: 1.45;
    justify-self: stretch;
    width: 100%;
    min-width: 0;
    max-width: none;
    border: 1px solid var(--line);
    background: var(--panel);
    border-radius: 10px;
    padding: 9px 13px;
  }
  .info-item input {
    width: 100%;
    border: 1px solid var(--line);
    background: var(--panel);
    border-radius: 10px;
    padding: 9px 13px;
    color: var(--text);
  }
  .info-item input[readonly] {
    color: var(--muted);
    background: var(--soft);
  }
  .form-control {
    justify-self: stretch;
    width: 100%;
  }
  select {
    width: 100%;
    min-height: 40px;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--text);
    border-radius: 10px;
    padding: 8px 12px;
    font: inherit;
    outline: none;
  }
  .form-actions {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 10px;
    padding-top: 18px;
  }
  .primary {
    background: var(--text);
    border-color: var(--text);
    color: var(--panel);
    min-width: 96px;
  }
  .pay-method {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .pay-badge {
    width: 34px;
    height: 24px;
    border-radius: 6px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
  }
  .pay-badge.wechat { background: #2aae67; }
  .pay-badge.alipay { background: #1677ff; }
  .pay-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-start;
  }
  .invoice-list {
    border-top: 1px solid var(--line);
  }
  .invoice-row {
    display: grid;
    grid-template-columns: 1.2fr 1fr 1fr 72px;
    gap: 16px;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
    align-items: center;
    font-size: 14px;
  }
  .invoice-row.head {
    color: var(--muted);
    font-size: 12px;
  }
  .invoice-row .ghost,
  .metric-row > .ghost,
  .form-actions .ghost {
    min-height: 38px;
    padding: 8px 13px;
    white-space: nowrap;
  }
  .table {
    display: grid;
    border-top: 1px solid var(--line);
  }
  .tr {
    display: grid;
    grid-template-columns: 1.35fr 0.8fr 0.8fr 0.8fr 0.9fr;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
    align-items: center;
    font-size: 13px;
  }
  .tr.head {
    color: var(--dim);
    font-size: 12px;
  }
  .mono {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--muted);
  }
  .pill {
    display: inline-flex;
    width: fit-content;
    border-radius: 999px;
    padding: 4px 8px;
    background: rgba(87,120,90,0.12);
    color: var(--green);
    font-size: 12px;
  }
  .hidden { display: none; }
  @media (max-width: 900px) {
    .shell { width: 100vw; height: 100vh; margin: 0; border-radius: 0; grid-template-columns: 1fr; }
    aside { display: none; }
    main { padding: 28px 22px; }
    .cards { grid-template-columns: 1fr 1fr; }
    .metric-row { grid-template-columns: 1fr; gap: 10px; }
    .info-item { grid-template-columns: 1fr; gap: 8px; }
    .info-item span { justify-self: stretch; min-width: 0; }
    .form-actions { justify-content: stretch; }
    .form-actions .ghost { flex: 1; }
    .tr { grid-template-columns: 1fr; gap: 4px; }
  }
</style>
</head>
<body>
  <div class="shell">
    <aside>
      <div class="search">⌕ <span>搜索</span></div>
      <div>
        <div class="nav-title">设置</div>
        <div class="nav">
          <button class="active" data-page="account" onclick="showPage('account')"><span class="dot">账</span>账户信息</button>
          <button data-page="study" onclick="showPage('study')"><span class="dot">留</span>留学信息</button>
          <button data-page="payment" onclick="showPage('payment')"><span class="dot">¥</span>支付</button>
          <button data-page="billing" onclick="showPage('billing')"><span class="dot">单</span>账单信息</button>
          <button data-page="usage" onclick="showPage('usage')"><span class="dot">量</span>用量</button>
          <button data-page="models" onclick="showPage('models')"><span class="dot">模</span>模型</button>
        </div>
      </div>
    </aside>
    <main>
      <div class="top">
        <div>
          <h1 id="pageTitle">账户信息 <span class="sub">IZANOFFER 管理后台</span></h1>
          <div class="sub" id="pageSubtitle">显示名称、登录账号和账号状态</div>
        </div>
        <button class="ghost" onclick="loadDashboard()">刷新</button>
      </div>

      <section id="account" class="active">
        <h2>账户信息</h2>
        <div class="info-grid" id="accountGrid"></div>
      </section>

      <section id="study">
        <h2>留学信息</h2>
        <div class="info-grid" id="studyGrid"></div>
      </section>

      <section id="payment">
        <h2>支付</h2>
        <div class="metric-row">
          <div>
            <div class="metric-name">支付方式</div>
            <div class="metric-note">第一版先保留微信 / 支付宝入口，后续接真实支付网关</div>
          </div>
          <div class="pay-method">
            <span class="pay-badge wechat">微信</span>
            <span>微信支付 / 支付宝</span>
          </div>
          <button class="ghost" onclick="alert('真实支付接入后，这里会打开支付方式管理。')">更新</button>
        </div>
        <div class="metric-row">
          <div>
            <div class="metric-name">余额</div>
            <div class="metric-note" id="paymentBalance">加载中</div>
            <input id="rechargeEmail" style="display:none;" value="451248901@qq.com">
          </div>
          <div class="pay-actions">
            <button class="ghost" onclick="recharge(10)">充值 ¥10</button>
            <button class="ghost" onclick="recharge(30)">充值 ¥30</button>
            <button class="ghost" onclick="recharge(100)">充值 ¥100</button>
          </div>
          <span class="pill">本地测试</span>
        </div>
        <div class="metric-row">
          <div>
            <div class="metric-name">自动充值</div>
            <div class="metric-note">余额不足时自动购买更多用量，第一版暂不启用</div>
          </div>
          <div></div>
          <button class="ghost" onclick="alert('自动充值会在接入真实支付后开放。')">开启</button>
        </div>
        <h2 style="margin-top:34px;">账单</h2>
        <div class="invoice-list" id="invoiceList"></div>
      </section>

      <section id="billing">
        <h2>账单信息</h2>
        <div class="cards">
          <div class="card"><b id="totalSpent">¥0</b><span>用户侧扣费</span></div>
          <div class="card"><b id="balanceTotal">¥0</b><span>账户余额池</span></div>
          <div class="card"><b id="providerCost">$0</b><span>模型服务成本</span></div>
          <div class="card"><b id="userCount">0</b><span>用户数</span></div>
        </div>
      </section>

      <section id="usage">
        <h2>用量</h2>
        <div class="metric-row">
          <div>
            <div class="metric-name">当前余额池</div>
            <div class="metric-note" id="balanceNote">Loading</div>
          </div>
          <div class="bar"><span id="balanceBar" style="width:0%"></span></div>
          <div class="pct" id="balancePct">0%</div>
        </div>
        <div class="metric-row">
          <div>
            <div class="metric-name">月度支出上限</div>
            <div class="metric-note" id="spendNote">Loading</div>
          </div>
          <div class="bar" id="spendBarWrap"><span id="spendBar" style="width:0%"></span></div>
          <div class="pct" id="spendPct">0%</div>
        </div>
        <div class="cards">
          <div class="card"><b id="totalTokens">0</b><span>总 tokens</span></div>
          <div class="card"><b id="promptTokens">-</b><span>输入 tokens</span></div>
          <div class="card"><b id="completionTokens">-</b><span>输出 tokens</span></div>
          <div class="card"><b id="markupRate">1.35x</b><span>服务倍率</span></div>
        </div>
      </section>

      <section id="models">
        <h2>模型</h2>
        <div class="info-grid" id="modelSummaryGrid"></div>
      </section>
    </main>
  </div>

<script>
  const money = value => Number(value || 0).toFixed(Number(value || 0) >= 1 ? 2 : 4);
  const compact = value => Number(value || 0).toLocaleString();
  let userMarkup = 1.35;
  let usdToCny = 7.0;

  function showPage(id) {
    document.querySelectorAll('main section').forEach(section => {
      section.classList.toggle('active', section.id === id);
    });
    document.querySelectorAll('.nav button[data-page]').forEach(button => {
      button.classList.toggle('active', button.dataset.page === id);
    });
    const meta = {
      account: ['账户信息', '显示名称、登录账号和账号状态'],
      study: ['留学信息', '学生画像和申请偏好'],
      payment: ['支付', '充值余额和支付入口'],
      billing: ['账单信息', '余额、扣费和模型服务成本'],
      usage: ['用量', 'Token 消耗和月度限制'],
      models: ['模型', 'OpenRouter 模型和价格摘要']
    }[id] || ['设置中心', ''];
    document.getElementById('pageTitle').innerHTML = `${meta[0]} <span class="sub">IZANOFFER 管理后台</span>`;
    document.getElementById('pageSubtitle').textContent = meta[1];
    document.querySelector('main').scrollTop = 0;
  }

  async function loadDashboard() {
    const [usageRes, modelsRes] = await Promise.all([
      fetch('/api/admin/usage'),
      fetch('/api/models')
    ]);
    const usage = await usageRes.json();
    const models = await modelsRes.json();
    renderUsage(usage);
    renderModels(models.models || []);
  }

  async function recharge(amount) {
    const email = document.getElementById('rechargeEmail').value.trim();
    const res = await fetch('/api/mock-auth/recharge', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, amount })
    });
    const data = await res.json();
    if (!res.ok) {
      alert(data.error || '充值失败');
      return;
    }
    loadDashboard();
  }

  function renderUsage(data) {
    const summary = data.summary || {};
    const users = data.users || [];
    const primaryUser = users[0] || {};
    const usageEvents = (data.events || []).filter(event => !event.type);
    const limit = Number(summary.monthlyLimitCny || 200);
    const spent = Number(summary.totalSpentCny || 0);
    const balance = Number(summary.totalBalanceCny || 0);
    const promptTokens = usageEvents.reduce((sum, item) => sum + Number(item.promptTokens || 0), 0);
    const completionTokens = usageEvents.reduce((sum, item) => sum + Number(item.completionTokens || 0), 0);
    const spentPct = Math.min(100, limit ? spent / limit * 100 : 0);
    const balancePct = Math.min(100, balance / 50 * 100);
    userMarkup = Number(summary.markup || 1.35);
    usdToCny = Number(summary.usdToCny || 7.0);

    renderAccount(primaryUser, summary);
    renderInfoGrid('studyGrid', primaryUser.profile || {
      '学校': '未填写',
      '专业': '未填写',
      '成绩': '未填写',
      '语言': '未填写',
      '目标国家': '未填写',
      '预算': '未填写'
    });
    document.getElementById('balanceNote').textContent = `共 ¥${money(balance)} · ${summary.userCount || 0} 个用户`;
    document.getElementById('balanceBar').style.width = `${balancePct}%`;
    document.getElementById('balancePct').textContent = `${Math.round(balancePct)}%`;
    document.getElementById('spendNote').textContent = `已用 ¥${money(spent)} · 上限 ¥${money(limit)}`;
    document.getElementById('spendBar').style.width = `${spentPct}%`;
    document.getElementById('spendPct').textContent = `${Math.round(spentPct)}%`;
    document.getElementById('spendBarWrap').classList.toggle('red', spentPct > 85);
    document.getElementById('totalSpent').textContent = `¥${money(spent)}`;
    document.getElementById('balanceTotal').textContent = `¥${money(balance)}`;
    document.getElementById('paymentBalance').textContent = `当前余额 ¥${money(primaryUser.balanceCny || 0)}`;
    document.getElementById('totalTokens').textContent = compact(summary.totalTokens);
    document.getElementById('promptTokens').textContent = compact(promptTokens);
    document.getElementById('completionTokens').textContent = compact(completionTokens);
    document.getElementById('markupRate').textContent = `${userMarkup}x`;
    document.getElementById('providerCost').textContent = `$${money(summary.providerCostUsd)}`;
    document.getElementById('userCount').textContent = compact(summary.userCount);
    renderInvoices(data.events || []);
  }

  function renderAccount(primaryUser, summary) {
    const displayName = primaryUser.displayName || (primaryUser.email ? primaryUser.email.split('@')[0] : '管理员');
    document.getElementById('accountGrid').innerHTML = `
      <div class="info-item">
        <div>
          <b>显示名称 / AI 称呼</b>
          <div class="field-copy">AI 顾问会用这个名字和你对话。</div>
        </div>
        <div class="form-control">
          <input id="displayNameInput" value="${escapeHtml(displayName)}">
        </div>
      </div>
      <div class="info-item">
        <div>
          <b>登录账号</b>
          <div class="field-copy">通常是你的邮箱，之后会由正式登录系统管理。</div>
        </div>
        <div class="form-control">
          <input value="${escapeHtml(primaryUser.email || '未登录')}" readonly>
        </div>
      </div>
      <div class="info-item">
        <div>
          <b>账户余额</b>
          <div class="field-copy">用于 AI 模型 token 消耗扣费。</div>
        </div>
        <div class="form-control">
          <input value="¥${money(primaryUser.balanceCny || 0)}" readonly>
        </div>
      </div>
      <div class="form-actions">
        <button class="ghost" onclick="loadDashboard()">取消</button>
        <button class="ghost primary" onclick="saveDisplayName()">保存修改</button>
      </div>
    `;
  }

  async function saveDisplayName() {
    const email = document.getElementById('rechargeEmail').value.trim();
    const displayName = document.getElementById('displayNameInput').value.trim();
    const res = await fetch('/api/mock-auth/profile', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, displayName })
    });
    const data = await res.json();
    if (!res.ok) {
      alert(data.error || '保存失败');
      return;
    }
    loadDashboard();
  }

  function renderInfoGrid(id, data) {
    document.getElementById(id).innerHTML = Object.entries(data).map(([key, value]) => `
      <div class="info-item">
        <b>${key}</b>
        <span>${value || '未填写'}</span>
      </div>
    `).join('');
  }

  function renderInvoices(events) {
    const rechargeEvents = events.filter(event => event.type === 'recharge');
    const rows = [
      '<div class="invoice-row head"><span>日期</span><span>金额</span><span>状态</span><span>操作</span></div>',
      ...rechargeEvents.slice(0, 8).map(event => {
        return `<div class="invoice-row"><span>${escapeHtml((event.createdAt || '').slice(0, 10))}</span><span>¥${money(event.amountCny)}</span><span>已充值</span><button class="ghost" onclick="alert('第一版仅展示充值账单摘要。')">查看</button></div>`;
      })
    ];
    if (!rechargeEvents.length) rows.push('<div class="invoice-row"><span>暂无充值记录</span><span>-</span><span>-</span><span></span></div>');
    document.getElementById('invoiceList').innerHTML = rows.join('');
  }

  function renderModels(models) {
    const current = models.find(model => model.id === 'openai/gpt-4o') || models[0] || {};
    renderInfoGrid('modelSummaryGrid', {
      '当前默认模型': current.id || 'openai/gpt-4o',
      '输入价格': current.promptUsdPer1M != null ? `$${money(current.promptUsdPer1M)} / 1M tokens` : '未加载',
      '输出价格': current.completionUsdPer1M != null ? `$${money(current.completionUsdPer1M)} / 1M tokens` : '未加载',
      '上下文长度': current.contextLength ? compact(current.contextLength) : '未加载',
      '模型服务商': 'OpenRouter',
      '状态': '文本模型可用'
    });
  }

  function escapeHtml(value) {
    return String(value || '').replace(/[&<>"']/g, char => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[char]));
  }

  loadDashboard();
</script>
</body>
</html>
